<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thesify — Smart Thesis Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;0,900;1,400;1,700&family=Poppins:wght=300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF6A00;--orange2:#ff8c3a;--dark:#0a0806;--dark2:#120e09;
  --paper:#f5f0e8;--text:#f0ece4;--muted:rgba(240,236,228,0.5);
  --border:rgba(255,106,0,0.2);
}
html{scroll-behavior:smooth;font-size:16px}
body{
  background:var(--dark);color:var(--text);
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;cursor:none;
}
a{text-decoration:none;color:inherit}

#cur{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--orange);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.08s;mix-blend-mode:normal}
#cur2{position:fixed;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,106,0,0.5);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left 0.12s ease,top 0.12s ease,width 0.3s,height 0.3s}

#c3{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:22px 48px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid transparent;transition:border-color 0.4s,background 0.4s;
}
nav.scrolled{background:rgba(10,8,6,0.9);border-color:var(--border);backdrop-filter:blur(12px)}
.nav-logo{display:flex;align-items:center;text-decoration:none;height:74px;}
.nav-logo img{height:74px;width:auto;object-fit:contain;}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{text-decoration:none;color:var(--muted);font-size:13px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s}
.nav-links a:hover{color:var(--text)}
.nav-cta{background:var(--orange);color:#fff;height:44px;padding:0 32px;font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;border:none;cursor:pointer;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);transition:filter 0.2s;display:flex;align-items:center;justify-content:center;}
.nav-cta:hover{filter:brightness(1.15)}

section{position:relative;z-index:10}

#hero{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:120px 24px 80px;overflow:hidden;
}
.hero-eyebrow{
  font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:var(--orange);
  margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:12px;
  opacity:0;animation:fadeUp 0.8s 0.3s forwards;
}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:32px;height:1px;background:var(--orange);opacity:0.5}
.hero-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(3.5rem,9vw,8rem);
  line-height:0.92;font-weight:900;
  letter-spacing:-0.03em;margin-bottom:8px;
  opacity:0;animation:fadeUp 0.9s 0.5s forwards;
}
.hero-title em{font-style:italic;color:var(--orange)}
.hero-title .outline{
  -webkit-text-stroke:1px rgba(240,236,228,0.25);
  color:transparent;
}
.hero-sub{
  font-size:clamp(1rem,2vw,1.2rem);color:var(--muted);max-width:520px;
  margin:32px auto 48px;line-height:1.7;font-weight:300;
  opacity:0;animation:fadeUp 0.9s 0.7s forwards;
}
.hero-btns{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  opacity:0;animation:fadeUp 0.9s 0.9s forwards;
}
.btn-primary{
  background:var(--orange);color:#fff;padding:16px 36px;
  font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  border:none;cursor:pointer;position:relative;overflow:hidden;
  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
  transition:filter 0.2s,transform 0.2s;
}
.btn-primary:hover{filter:brightness(1.12);transform:translateY(-2px)}
.btn-ghost{
  background:transparent;color:var(--text);padding:15px 36px;
  font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  border:1px solid rgba(240,236,228,0.2);cursor:pointer;
  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
  transition:border-color 0.2s,transform 0.2s;
}
.btn-ghost:hover{border-color:var(--orange);transform:translateY(-2px)}

.hero-stats{
  display:flex;gap:60px;justify-content:center;margin-top:72px;
  opacity:0;animation:fadeUp 0.9s 1.1s forwards;
  flex-wrap:wrap;
}
.stat{text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:700;color:var(--orange);line-height:1}
.stat-label{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:6px}

.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0 auto}

#marquee-wrap{padding:24px 0;overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(255,106,0,0.03)}
.marquee-track{display:flex;gap:48px;white-space:nowrap;animation:marquee 22s linear infinite}
.marquee-item{font-size:12px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:16px}
.marquee-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);flex-shrink:0}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

#services{padding:120px 48px}
.section-label{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--orange);margin-bottom:16px}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:700;line-height:1.1;margin-bottom:60px}
.section-title em{font-style:italic;color:var(--orange)}

.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2px}
.service-card{
  padding:40px 36px;background:var(--dark2);border:1px solid var(--border);
  position:relative;overflow:hidden;cursor:pointer;
  transition:border-color 0.3s,transform 0.3s;
}
.service-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--orange);transform:scaleX(0);transform-origin:left;
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.service-card:hover{border-color:rgba(255,106,0,0.5);transform:translateY(-4px)}
.service-card:hover::before{transform:scaleX(1)}
.service-num{font-size:11px;letter-spacing:0.2em;color:var(--orange);margin-bottom:20px;opacity:0.6}
.service-icon{font-size:2rem;margin-bottom:20px}
.service-name{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:12px}
.service-desc{font-size:13px;color:var(--muted);line-height:1.7}
.service-arrow{
  position:absolute;bottom:28px;right:28px;width:32px;height:32px;
  border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:background 0.3s,border-color 0.3s;
}
.service-card:hover .service-arrow{background:var(--orange);border-color:var(--orange)}

#process{padding:120px 48px;background:linear-gradient(135deg,#0d0a07 0%,#120e09 100%)}
.process-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;max-width:1100px;margin:0 auto}
.process-visual{position:relative;height:440px;display:flex;align-items:center;justify-content:center}
.process-ring{
  position:absolute;border-radius:50%;border:1px solid;
  animation:spin 20s linear infinite;
}
.pr1{width:340px;height:340px;border-color:rgba(255,106,0,0.15);animation-duration:28s}
.pr2{width:260px;height:260px;border-color:rgba(255,106,0,0.25);animation-direction:reverse;animation-duration:18s}
.pr3{width:180px;height:180px;border-color:rgba(255,106,0,0.4);animation-duration:12s}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.process-center{
  width:120px;height:120px;border-radius:50%;background:var(--orange);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:2rem;color:#fff;font-weight:700;
  box-shadow:0 0 60px rgba(255,106,0,0.4);z-index:2;position:relative;
}
.orbit-dot{
  position:absolute;width:10px;height:10px;border-radius:50%;background:var(--orange);
  top:50%;left:50%;margin:-5px 0 0 -5px;
}
.orbit-dot:nth-child(1){animation:orbit1 6s linear infinite}
.orbit-dot:nth-child(2){animation:orbit2 9s linear infinite;background:var(--paper);width:6px;height:6px}
.orbit-dot:nth-child(3){animation:orbit3 14s linear infinite;width:8px;height:8px;opacity:0.6}
@keyframes orbit1{from{transform:rotate(0) translateX(130px) rotate(0)}to{transform:rotate(360deg) translateX(130px) rotate(-360deg)}}
@keyframes orbit2{from{transform:rotate(45deg) translateX(170px) rotate(-45deg)}to{transform:rotate(405deg) translateX(170px) rotate(-405deg)}}
@keyframes orbit3{from{transform:rotate(200deg) translateX(215px) rotate(-200deg)}to{transform:rotate(560deg) translateX(215px) rotate(-560deg)}}

.steps{display:flex;flex-direction:column;gap:0}
.step{
  padding:28px 0;border-bottom:1px solid var(--border);
  display:flex;gap:24px;align-items:flex-start;cursor:default;
  transition:padding-left 0.3s;
}
.step:hover{padding-left:8px}
.step-num{
  font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;
  color:var(--orange);opacity:0.4;min-width:40px;line-height:1;
  transition:opacity 0.3s;
}
.step:hover .step-num{opacity:1}
.step-title{font-size:15px;font-weight:600;margin-bottom:6px}
.step-desc{font-size:13px;color:var(--muted);line-height:1.6}

#testimonials{padding:120px 48px;overflow:hidden}
.testi-track-wrap{overflow:hidden;margin-top:60px}
@keyframes marqueeTesti {
  0% { transform: translateX(0); }
  100% { transform: translateX(calc(-50% - 12px)); }
}
.testi-track{display:flex;gap:24px;width:max-content;animation:marqueeTesti 90s linear infinite;}
.testi-track:hover{animation-play-state:paused;}
.testi-card{
  min-width:380px;padding:40px;background:var(--dark2);
  border:1px solid var(--border);border-radius:0;flex-shrink:0;position:relative;
}
.testi-card::after{
  content:'\201C';position:absolute;top:20px;right:28px;
  font-family:'Playfair Display',serif;font-size:6rem;color:var(--orange);
  opacity:0.08;line-height:1;
}
.testi-stars{color:var(--orange);font-size:14px;margin-bottom:16px;letter-spacing:2px}
.testi-text{font-size:14px;line-height:1.8;color:var(--muted);margin-bottom:24px;font-style:italic}
.testi-author{font-weight:600;font-size:13px}
.testi-role{font-size:11px;color:var(--orange);letter-spacing:0.1em;margin-top:2px}
.testi-nav{display:flex;gap:12px;margin-top:36px}
.testi-btn{
  width:44px;height:44px;border:1px solid var(--border);background:transparent;
  color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,border-color 0.2s;
}
.testi-btn:hover{background:var(--orange);border-color:var(--orange)}

#pricing{padding:120px 48px;background:linear-gradient(135deg,#0d0a07
