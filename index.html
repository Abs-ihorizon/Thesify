<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thesify — Smart Thesis Solutions</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --orange:#FF6A00;
  --dark:#0a0806;
  --dark2:#120e09;
  --text:#f0ece4;
  --muted:rgba(240,236,228,0.5);
  --border:rgba(255,106,0,0.2);
}

html{scroll-behavior:smooth}
body{
  background:var(--dark);
  color:var(--text);
  font-family:Poppins,sans-serif;
  overflow-x:hidden;
  cursor:none;
}

/* CURSOR */
#cur,#cur2{
  position:fixed;
  pointer-events:none;
  border-radius:50%;
  z-index:9999;
}
#cur{width:10px;height:10px;background:var(--orange);transform:translate(-50%,-50%)}
#cur2{width:36px;height:36px;border:1px solid rgba(255,106,0,0.5);transform:translate(-50%,-50%)}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;
  padding:20px 40px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:100;
  transition:.3s;
}
nav.scrolled{
  background:rgba(10,8,6,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

/* HERO */
#hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 20px}

.hero-title{
  font-family:"Playfair Display";
  font-size:clamp(3rem,8vw,7rem);
  line-height:1;
}
.hero-title em{color:var(--orange)}

.hero-sub{max-width:520px;margin:20px auto;color:var(--muted)}

.btn-primary{
  background:var(--orange);
  border:none;
  padding:14px 28px;
  color:#fff;
  cursor:pointer;
}

/* STATS */
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:60px;flex-wrap:wrap}
.stat-num{font-size:2rem;color:var(--orange)}

/* SERVICES */
section{padding:100px 40px}

/* TESTIMONIALS */
.testi-track{display:flex;gap:20px;overflow:hidden}
.testi-card{
  min-width:320px;
  background:var(--dark2);
  padding:20px;
  border:1px solid var(--border);
}

/* CTA */
#cta{text-align:center}

/* PROGRESS */
#progress{
  position:fixed;top:0;left:0;height:2px;
  background:var(--orange);
  width:0%;
  z-index:999;
}

/* WHATSAPP */
.whatsapp-btn{
  position:fixed;bottom:20px;right:20px;
}

</style>
</head>

<body>

<div id="progress"></div>
<div id="cur"></div>
<div id="cur2"></div>

<nav id="nav">
  <div><strong>Thesify</strong></div>
  <button class="btn-primary" onclick="window.location.href='contact.html'">Get Started</button>
</nav>

<section id="hero">
  <div>
    <h1 class="hero-title">Your Thesis <em>Perfected</em></h1>
    <p class="hero-sub">Expert academic writing services for PhD, Masters & Research papers.</p>

    <button class="btn-primary" onclick="document.getElementById('services').scrollIntoView({behavior:'smooth'})">
      Explore Services
    </button>

    <div class="hero-stats">
      <div><div class="stat-num" data-count="100">0</div>Projects</div>
      <div><div class="stat-num" data-count="98">0</div>% Satisfaction</div>
      <div><div class="stat-num" data-count="10">0</div>Experts</div>
      <div><div class="stat-num" data-count="5">0</div>Years</div>
    </div>
  </div>
</section>

<section id="testimonials">
  <h2>Reviews</h2>
  <div class="testi-track" id="ttrack">
    <div style="color:var(--muted)">Loading reviews...</div>
  </div>
</section>

<section id="cta">
  <h2>Ready to Start?</h2>
  <button class="btn-primary" onclick="window.location.href='contact.html'">Get Free Consultation</button>
</section>

<footer style="text-align:center;padding:40px;color:var(--muted)">
  © 2026 Thesify
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* CURSOR */
const cur=document.getElementById('cur');
const cur2=document.getElementById('cur2');
let cx=0,cy=0,dx=0,dy=0;

document.addEventListener('mousemove',e=>{
  cx=e.clientX;
  cy=e.clientY;
});

function cursorLoop(){
  dx+=(cx-dx)*0.15;
  dy+=(cy-dy)*0.15;
  cur.style.left=cx+'px';
  cur.style.top=cy+'px';
  cur2.style.left=dx+'px';
  cur2.style.top=dy+'px';
  requestAnimationFrame(cursorLoop);
}
cursorLoop();

/* NAV SCROLL */
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled',window.scrollY>50);

  const scrollTop=window.scrollY;
  const docHeight=document.body.scrollHeight-window.innerHeight;
  document.getElementById('progress').style.width=(scrollTop/docHeight*100)+'%';
});

/* COUNTER */
function countUp(el,target){
  let n=0;
  const step=Math.ceil(target/50);
  const interval=setInterval(()=>{
    n+=step;
    if(n>=target)n=target;
    el.textContent=n;
    if(n===target)clearInterval(interval);
  },30);
}

const hero=document.getElementById('hero');
const obs=new IntersectionObserver(e=>{
  if(e[0].isIntersecting){
    document.querySelectorAll('[data-count]').forEach(el=>{
      countUp(el,parseInt(el.dataset.count));
    });
  }
},{threshold:0.5});

obs.observe(hero);

/* REVIEWS */
const track=document.getElementById('ttrack');

async function loadReviews(){
  try{
    const res=await fetch('/api/reviews');
    const data=await res.json();

    if(!data?.success || !data?.reviews?.length){
      track.innerHTML="<div style='color:var(--muted)'>No reviews available</div>";
      return;
    }

    let html='';
    data.reviews.forEach(r=>{
      const stars=Number(r.priority)||3;
      const safeStars=Math.min(Math.max(stars,1),3);

      html+=`
        <div class="testi-card">
          <div>${"★".repeat(safeStars)}${"☆".repeat(3-safeStars)}</div>
          <p>"${r.x_review || r.review || "Great service"}"</p>
          <strong>${r.name || "Anonymous"}</strong>
        </div>
      `;
    });

    track.innerHTML=html+html; // loop effect

  }catch(err){
    console.error(err);
    track.innerHTML="<div style='color:var(--muted)'>Failed to load reviews</div>";
  }
}

loadReviews();

</script>

</body>
</html>
